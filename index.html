<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AiKipa Shop Pro</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        /* Base Setup */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #000;
            color: white;
            overflow-x: hidden;
        }

        /* Splash Screen */
        #splash {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .logo {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 3px solid cyan;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            font-weight: bold;
            color: cyan;
            box-shadow: 0 0 30px cyan;
            animation: glow 1.5s infinite alternate;
        }

        @keyframes glow {
            from { box-shadow: 0 0 20px cyan; }
            to { box-shadow: 0 0 40px cyan; }
        }

        .loading {
            margin-top: 20px;
            color: #aaa;
            font-size: 14px;
            letter-spacing: 1px;
        }

        /* Pages Layout */
        .page {
            display: none;
            padding: 20px;
            padding-bottom: 100px;
            animation: fadeIn 0.4s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            color: cyan;
            text-align: center;
            margin-top: 20px;
            margin-bottom: 20px;
            font-weight: 700;
        }

        /* Card Elements */
        .card {
            background: rgba(255, 255, 255, .05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 255, 255, .2);
            border-radius: 25px;
            padding: 20px;
            margin-top: 15px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .menuCard {
            background: #111;
            border: 1px solid rgba(0, 255, 255, .2);
            border-radius: 25px;
            padding: 25px 10px;
            text-align: center;
            transition: transform 0.2s;
        }

        .menuCard:active {
            transform: scale(0.95);
        }

        /* Global Buttons */
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 50px;
            background: cyan;
            color: black;
            font-weight: bold;
            margin-top: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #00cccc;
        }

        /* Inputs */
        .search {
            width: 100%;
            padding: 15px;
            background: #111;
            border: 1px solid rgba(0, 255, 255, .2);
            outline: none;
            color: white;
            border-radius: 20px;
            font-size: 16px;
        }

        .search:focus {
            border-color: cyan;
        }

        /* Bottom Navigation */
        .bottom {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #111;
            display: flex;
            justify-content: space-around;
            padding: 10px;
            border-top: 1px solid rgba(0, 255, 255, 0.3);
            z-index: 999;
        }

        .bottom .navBtn {
            background: none;
            color: #888;
            font-size: 12px;
            width: auto;
            margin-top: 0;
            padding: 5px;
            font-weight: normal;
            flex: 1;
        }

        .bottom .navBtn.active-nav {
            color: cyan;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="splash">
        <div class="logo">AiKipa</div>
        <div class="loading">Loading...</div>
    </div>

    <div class="page active" id="home">
        <div class="logo" style="margin: 30px auto 10px auto;">AiKipa</div>
        <h1>Premium Gift Plan<br>NFT Stars Shop</h1>
        <div class="card">
            <p style="text-align: center; color: #ccc;">
                Buy Telegram Stars, Premium and NFT
            </p>
            <button onclick="openShop()">Start</button>
        </div>
    </div>

    <div class="page" id="shop">
        <h1>🛒 Shop</h1>
        <input class="search" id="searchInput" placeholder="Search products..." onkeyup="filterProducts()">
        
        <div class="grid" id="productsGrid">
            <div class="menuCard" data-name="stars">
                <span style="font-size: 24px;">⭐</span><br><br>
                Stars
                <button>Open</button>
            </div>

            <div class="menuCard" data-name="premium">
                <span style="font-size: 24px;">👑</span><br><br>
                Premium
                <button>Open</button>
            </div>

            <div class="menuCard" data-name="nft">
                <span style="font-size: 24px;">🖼</span><br><br>
                NFT
                <button>Open</button>
            </div>

            <div class="menuCard" data-name="contact">
                <span style="font-size: 24px;">📞</span><br><br>
                Contact
                <button onclick="window.open('https://t.me/AiKipa', '_blank')">Open</button>
            </div>
        </div>
    </div>

    <div class="page" id="orders">
        <h1>📜 Order History</h1>
        <div class="card" style="text-align: center; color: #aaa;">
            No orders yet
        </div>
    </div>

    <div class="page" id="profile">
        <h1>👤 Profile</h1>
        <div class="card">
            <span style="color: #aaa; font-size: 12px;">Username</span><br>
            <strong>@username</strong>
        </div>
        <div class="card">
            <span style="color: #aaa; font-size: 12px;">Status</span><br>
            <strong style="color: cyan;">Premium Member</strong>
        </div>
    </div>

    <div class="bottom">
        <button class="navBtn active-nav" id="btn-home" onclick="showPage('home')">
            🏠<br>Home
        </button>
        <button class="navBtn" id="btn-shop" onclick="showPage('shop')">
            🛒<br>Shop
        </button>
        <button class="navBtn" id="btn-orders" onclick="showPage('orders')">
            📜<br>Orders
        </button>
        <button class="navBtn" id="btn-profile" onclick="showPage('profile')">
            👤<br>Profile
        </button>
    </div>

    <script>
        // Splash Screen Timeout
        setTimeout(() => {
            const splash = document.getElementById("splash");
            splash.style.opacity = 0;
            setTimeout(() => splash.style.display = "none", 500);
        }, 2000);

        // Page Navigation Logic
        function showPage(pageId) {
            // Hide all pages
            document.querySelectorAll(".page").forEach(page => {
                page.classList.remove("active");
            });

            // Show current page
            document.getElementById(pageId).classList.add("active");

            // Update Navigation active state
            document.querySelectorAll(".navBtn").forEach(btn => {
                btn.classList.remove("active-nav");
            });
            document.getElementById(`btn-${pageId}`).classList.add("active-nav");
        }

        function openShop() {
            showPage("shop");
        }

        // Search Filter Logic
        function filterProducts() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('#productsGrid .menuCard');
            
            cards.forEach(card => {
                const productName = card.getAttribute('data-name');
                if (productName.includes(input)) {
                    card.style.display = "block";
                } else {
                    card.style.display = "none";
                }
            });
        }
    </script>
</body>
</html>
